# docker-compose.override.yml
#
# Loaded automatically by `docker compose` alongside docker-compose.yml.
# Use it to customize the setup for your environment without modifying the main file.
#
# Default install: `docker compose up -d` brings up both the bot and OpenCode.
# Update flow:    `git pull && docker compose up -d --build`

# Example: expose a port for debugging
# services:
#   bot:
#     ports:
#       - "3000:3000"

# Example: add extra environment variables
# services:
#   bot:
#     environment:
#       - MY_CUSTOM_VAR=value
