services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    volumes:
      - ./memory:/workspace/memory
      - opencode-config:/root/.config/opencode
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      opencode:
        condition: service_started
    volumes:
      - ./memory:/app/memory
      - bot-data:/app/data
    env_file: .env
    restart: unless-stopped

volumes:
  opencode-config:
  bot-data:
