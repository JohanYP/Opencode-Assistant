# Cron Jobs
# Define scheduled tasks here. Changes are automatically synced with the bot.
#
# Types:
#   task     — creates an OpenCode session and runs the prompt (default)
#   reminder — sends a direct Telegram message (no OpenCode session)
#   backup   — copies memory files to memory/backups/YYYY-MM-DD/
#
# Schedule format: standard cron expression (min hour dom month dow)
#   "0 8 * * *"     = every day at 8:00 AM
#   "0 18 * * 5"    = every Friday at 6:00 PM
#   "30 7 * * 1-5"  = weekdays at 7:30 AM
#
# Timezone: use IANA timezone names (e.g. America/Bogota, Europe/Madrid, UTC)

crons: []

